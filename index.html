<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA ワールドカップ 2026</title>
<style>
:root {
  --bg: #080c1f;
  --card: #0f1630;
  --card2: #182040;
  --accent: #1d6fff;
  --accent2: #0a4fd8;
  --gold: #f0a500;
  --text: #dde4f5;
  --muted: #5a6a90;
  --green: #22c55e;
  --red: #ef4444;
  --border: #1e2d55;
  --qualify: rgba(29, 111, 255, 0.12);
  --qualify3: rgba(240, 165, 0, 0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Segoe UI', 'Hiragino Sans', sans-serif;
  min-height: 100vh;
}

/* ===== HEADER ===== */
.header {
  background: linear-gradient(160deg, #060f2a 0%, #0d2060 60%, #1a3a9f 100%);
  padding: 20px 16px 16px;
  text-align: center;
  border-bottom: 2px solid var(--gold);
  position: sticky; top: 0; z-index: 100;
}
.header-top { display: flex; align-items: center; justify-content: center; gap: 10px; }
.header h1 { font-size: clamp(1.1rem, 3vw, 1.6rem); font-weight: 900; letter-spacing: -0.5px; }
.header-hosts { color: var(--gold); font-size: 0.8rem; margin-top: 4px; letter-spacing: 1px; }
.header-meta {
  display: flex; align-items: center; justify-content: center; gap: 14px;
  font-size: 0.75rem; color: var(--muted); margin-top: 8px;
}
.status-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: var(--green); margin-right: 4px;
  transition: background 0.3s;
}
.status-dot.loading { background: var(--gold); animation: blink 1s ease infinite; }
.status-dot.error { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ===== TABS ===== */
.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 100px; z-index: 90;
}
.tab {
  flex: 1; padding: 13px 8px; text-align: center;
  cursor: pointer; font-weight: 600; font-size: clamp(0.72rem, 2vw, 0.88rem);
  color: var(--muted); border-bottom: 3px solid transparent;
  transition: all .2s; user-select: none;
}
.tab.active { color: var(--accent); border-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); background: var(--card2); }

/* ===== PANELS ===== */
.panel { display: none; padding: 14px 12px; max-width: 1280px; margin: 0 auto; }
.panel.active { display: block; }

/* ===== FILTER BAR ===== */
.filter-bar {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.filter-btn {
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--muted); cursor: pointer; font-size: 0.78rem;
  font-weight: 600; transition: all .2s; white-space: nowrap;
}
.filter-btn.active, .filter-btn:hover {
  background: var(--accent); border-color: var(--accent); color: #fff;
}

/* ===== MATCH CARDS ===== */
.date-section { margin-bottom: 18px; }
.date-header {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; margin-bottom: 8px;
  background: var(--card2); border-radius: 8px;
  font-weight: 700; font-size: 0.85rem;
  border-left: 3px solid var(--gold); color: var(--gold);
}
.today-badge {
  background: var(--red); color: #fff;
  font-size: 0.65rem; padding: 2px 7px; border-radius: 10px;
  font-weight: 800; letter-spacing: 0.5px;
}
.match-card {
  background: var(--card); border-radius: 10px;
  padding: 11px 14px; margin-bottom: 7px;
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 10px;
  border: 1px solid var(--border); transition: border-color .2s;
}
.match-card:hover { border-color: var(--accent); }
.match-card.is-live { border-color: var(--red); animation: live-pulse 2.5s ease infinite; }
.match-card.is-today { border-color: rgba(29,111,255,0.4); }
@keyframes live-pulse {
  0%,100%{border-color:var(--red)} 50%{border-color:#ff8888}
}
.match-team {
  display: flex; align-items: center; gap: 8px;
  overflow: hidden;
}
.match-team.away { flex-direction: row-reverse; text-align: right; }
.team-flag { font-size: 1.4rem; flex-shrink: 0; }
.team-name { font-weight: 600; font-size: clamp(0.75rem, 2vw, 0.92rem); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.match-center { text-align: center; min-width: 90px; }
.score-display { font-size: clamp(1.3rem, 4vw, 1.7rem); font-weight: 900; letter-spacing: 2px; }
.match-sub {
  font-size: 0.68rem; color: var(--muted); margin-top: 2px;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.live-badge {
  background: var(--red); color: #fff;
  font-size: 0.6rem; padding: 1px 6px; border-radius: 8px;
  font-weight: 800; letter-spacing: 1px;
}
.match-time { font-size: 0.88rem; font-weight: 700; color: var(--text); }
.group-chip {
  font-size: 0.62rem; color: var(--muted);
  background: var(--card2); padding: 2px 8px; border-radius: 8px;
  font-weight: 600;
}

/* ===== GROUP STANDINGS ===== */
.groups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
}
.group-card {
  background: var(--card); border-radius: 12px;
  overflow: hidden; border: 1px solid var(--border);
}
.group-title {
  background: linear-gradient(90deg, #0a1f5c 0%, #1a3a8f 100%);
  padding: 10px 14px; font-weight: 800;
  font-size: 0.95rem; color: var(--gold);
  display: flex; align-items: center; gap: 6px;
}
.standings-table { width: 100%; border-collapse: collapse; }
.standings-table th {
  font-size: 0.65rem; color: var(--muted); padding: 6px 6px;
  text-align: center; background: var(--card2);
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.standings-table th:nth-child(2) { text-align: left; }
.standings-table td {
  padding: 9px 6px; text-align: center;
  font-size: 0.82rem; border-top: 1px solid var(--border);
}
.standings-table td:nth-child(2) { text-align: left; font-weight: 600; }
.standings-table tr:hover td { background: rgba(255,255,255,0.03); }
.standings-table tr.q1 td { background: var(--qualify); }
.standings-table tr.q2 td { background: var(--qualify); }
.standings-table tr.q3 td { background: var(--qualify3); }
.rank-cell { color: var(--muted); font-size: 0.8rem; font-weight: 700; width: 22px; }
.pts-cell { font-weight: 900; color: var(--text); font-size: 0.9rem; }
.standings-legend {
  text-align: center; margin-top: 14px; margin-bottom: 4px;
  font-size: 0.72rem; color: var(--muted);
  display: flex; gap: 14px; justify-content: center;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }

/* ===== BRACKET ===== */
.bracket-scroll { overflow-x: auto; padding-bottom: 12px; }
.bracket {
  display: flex; gap: 0; min-width: 820px;
  align-items: stretch;
}
.b-round {
  flex: 1; display: flex; flex-direction: column;
  position: relative;
}
.b-round-title {
  font-size: 0.68rem; font-weight: 800; color: var(--gold);
  text-align: center; padding: 10px 4px;
  text-transform: uppercase; letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
}
.b-round-matches {
  flex: 1; display: flex; flex-direction: column;
  justify-content: space-around; padding: 8px 4px;
}
.b-match {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden; margin: 4px 0;
  transition: border-color .2s;
}
.b-match:hover { border-color: var(--accent); }
.b-team {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 9px; font-size: 0.76rem; font-weight: 600;
}
.b-team + .b-team { border-top: 1px solid var(--border); }
.b-team.winner { background: rgba(34,197,94,0.15); }
.b-team.loser { color: var(--muted); }
.b-score { margin-left: auto; font-weight: 900; font-size: 0.88rem; min-width: 16px; text-align: right; }
.b-tbd { color: var(--muted); font-style: italic; font-weight: 400; font-size: 0.74rem; }
.b-flag { font-size: 1.1rem; flex-shrink: 0; }
.bracket-3rd { margin-top: 20px; }
.bracket-3rd-title {
  font-size: 0.78rem; font-weight: 700; color: var(--muted);
  margin-bottom: 8px; padding-left: 4px;
}

/* ===== LOADING / ERROR ===== */
.loading-box {
  text-align: center; padding: 60px 20px; color: var(--muted);
}
.spinner {
  width: 38px; height: 38px;
  border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.9s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-box {
  text-align: center; padding: 40px 20px; color: var(--red);
}
.retry-btn {
  margin-top: 14px; padding: 8px 22px;
  background: var(--accent); border: none; color: #fff;
  border-radius: 8px; cursor: pointer; font-size: 0.85rem;
  font-weight: 600; transition: background .2s;
}
.retry-btn:hover { background: var(--accent2); }

/* ===== RESPONSIVE ===== */
@media (max-width: 500px) {
  .header h1 { font-size: 1rem; }
  .tabs { top: 88px; }
  .team-name { font-size: 0.75rem; }
  .score-display { font-size: 1.2rem; }
  .match-card { gap: 6px; padding: 9px 10px; }
  .groups-grid { grid-template-columns: 1fr; }
}
</style>
</head>

// ======================================================
// AUTH
// ======================================================
async function getToken() {
  const stored = localStorage.getItem('wc26_tok');
  if (stored) {
    try {
      const p = JSON.parse(atob(stored.split('.')[1]));
      if (p.exp && p.exp * 1000 > Date.now() + 60000) return stored;
    } catch(_) {}
  }
  // Register fresh account
  const email = `wc26${Math.random().toString(36).slice(2,9)}@wcdash.app`;
  const r = await fetch(`${API}/auth/register`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: 'WC2026 Dashboard', email, password: 'WC26Dash!x7' })
  });
  const d = await r.json();
  if (d.token) {
    localStorage.setItem('wc26_tok', d.token);
    localStorage.setItem('wc26_em', email);
    return d.token;
  }
  // Try login
  const le = localStorage.getItem('wc26_em');
  if (le) {
    const lr = await fetch(`${API}/auth/authenticate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: le, password: 'WC26Dash!x7' })
    });
    const ld = await lr.json();
    if (ld.token) { localStorage.setItem('wc26_tok', ld.token); return ld.token; }
  }
  throw new Error('auth_failed');
}

async function apiFetch(path) {
  const tok = await getToken();
  const r = await fetch(`${API}${path}`, { headers: { Authorization: `Bearer ${tok}` } });
  if (r.status === 401) { localStorage.removeItem('wc26_tok'); return apiFetch(path); }
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ======================================================
// DATA LOAD
// ======================================================
async function loadData() {
  setStatus('loading');
  try {
    const [rawGames, rawGroups, rawTeams] = await Promise.all([
      apiFetch('/get/games'),
      apiFetch('/get/groups'),
      apiFetch('/get/teams'),
    ]);
    S.games  = norm(rawGames,  ['games','data','matches','results']);
    S.groups = norm(rawGroups, ['groups','data']);
    S.teams  = norm(rawTeams,  ['teams','data']);
    S.teamById = {};
    S.teams.forEach(t => { S.teamById[t.id || t._id] = t; });
    S.mode = 'live';
    setStatus('ok');
    render();
  } catch(e) {
    console.warn('API unavailable, using fallback:', e.message);
    // Use static schedule as fallback
    S.games = STATIC_SCHEDULE.matches.map((m, i) => ({
      _static: true, id: i,
      team1: m.team1, team2: m.team2,
      date: m.date, time: m.time,
      group: m.group ? m.group.replace('Group ', '') : null,
      round: m.round, ground: m.ground,
      score1: m.score1 ?? null, score2: m.score2 ?? null,
      finished: m.score1 != null,
    }));
    S.mode = 'fallback';
    setStatus('fallback');
    render();
  }
  scheduleRefresh();
}

function norm(data, keys) {
  if (Array.isArray(data)) return data;
  for (const k of keys) if (Array.isArray(data[k])) return data[k];
  return [];
}

// ======================================================
// STATUS
// ======================================================
function setStatus(s) {
  const dot = document.getElementById('sdot');
  const lbl = document.getElementById('last-upd');
  dot.className = 'status-dot ' + (s === 'ok' ? '' : s === 'fallback' ? '' : s);
  if (s === 'ok') {
    dot.style.background = 'var(--green)';
    lbl.textContent = `最終更新: ${new Date().toLocaleTimeString('ja-JP')}`;
  } else if (s === 'fallback') {
    dot.style.background = 'var(--gold)';
    lbl.textContent = `スケジュール表示中 (スコアはAPIが必要)`;
  } else if (s === 'loading') {
    dot.style.background = 'var(--gold)';
    dot.className = 'status-dot loading';
    lbl.textContent = '更新中...';
  } else {
    dot.style.background = 'var(--red)';
    lbl.textContent = '更新失敗';
  }
}

function scheduleRefresh() {
  clearTimeout(refreshTimer); clearInterval(countdownTimer);
  nextRefreshAt = Date.now() + REFRESH_MS;
  refreshTimer = setTimeout(loadData, REFRESH_MS);
  countdownTimer = setInterval(() => {
    const rem = Math.max(0, nextRefreshAt - Date.now());
    const m = Math.floor(rem / 60000), ss = Math.floor((rem % 60000) / 1000);
    document.getElementById('next-ref').textContent = `${m}:${String(ss).padStart(2,'0')}`;
  }, 1000);
}

// ======================================================
// HELPERS
// ======================================================
function teamFlag(team) {
  if (!team) return '🏳️';
  return FLAG[team.name_en] || FLAG[team.name] || '🏳️';
}
function staticFlag(name) { return FLAG[name] || '🏳️'; }

function toJST(time, date) {
  if (!time) return null;
  const m = time.match(/(\d{1,2}):(\d{2})\s*UTC([+-]\d+)/);
  if (!m) return time;
  const h = parseInt(m[1]), mn = parseInt(m[2]), off = parseInt(m[3]);
  // UTC offset → JST (UTC+9)
  let jstH = ((h - off + 9) % 24 + 24) % 24;
  return `${String(jstH).padStart(2,'0')}:${String(mn).padStart(2,'0')} JST`;
}

const TODAY = new Date().toISOString().slice(0,10);
function isToday(d) { return d && d.slice(0,10) === TODAY; }

function fmtDate(d) {
  if (!d) return '';
  // Handle "June 11, 2026" format
  const parsed = new Date(d);
  if (isNaN(parsed)) return d;
  return parsed.toLocaleDateString('ja-JP', { month:'long', day:'numeric', weekday:'short' });
}

function sortKey(d) {
  if (!d) return '9999';
  const p = new Date(d);
  return isNaN(p) ? d : p.toISOString();
}

// ======================================================
// RENDER: SCHEDULE
// ======================================================
function render() { renderSchedule(); renderStandings(); renderBracket(); buildFilter(); }

function buildFilter() {
  const bar = document.getElementById('group-filter');
  const letters = 'ABCDEFGHIJKL'.split('');
  const btns = letters.map(g =>
    `<button class="filter-btn${S.activeGroup===g?' active':''}" data-g="${g}">G.${g}</button>`
  ).join('');
  bar.innerHTML = `
    <button class="filter-btn${S.activeGroup==='all'?' active':''}" data-g="all">すべて</button>
    <button class="filter-btn${S.activeGroup==='today'?' active':''}" data-g="today">本日</button>
    <button class="filter-btn${S.activeGroup==='ko'?' active':''}" data-g="ko">決勝T</button>
    ${btns}`;
}

function renderSchedule() {
  let games = [...S.games];

  // Filter
  if (S.activeGroup === 'today') {
    games = games.filter(g => isToday(g.date || g.local_date));
  } else if (S.activeGroup === 'ko') {
    games = games.filter(g => {
      const r = g.round || g.type || '';
      return r.includes('Round') || r.includes('Quarter') || r.includes('Semi') || r.includes('Final') || r.includes('third');
    });
  } else if (S.activeGroup !== 'all') {
    games = games.filter(g => {
      const grp = g.group || '';
      return grp === S.activeGroup || grp === `Group ${S.activeGroup}` || grp === `Group_${S.activeGroup}`;
    });
  }

  if (!games.length) {
    document.getElementById('schedule-body').innerHTML =
      '<div class="loading-box">📭 該当する試合がありません</div>'; return;
  }

  // Group by date
  const byDate = {};
  games.forEach(g => {
    const d = (g.date || g.local_date || '').slice(0,10) || 'Unknown';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(g);
  });

  const dates = Object.keys(byDate).sort((a,b) => sortKey(a) < sortKey(b) ? -1 : 1);

  let html = '';
  dates.forEach(d => {
    const todayMark = isToday(d)
      ? `<span class="today-badge">TODAY</span>` : '';
    html += `<div class="date-section">
      <div class="date-header">📅 ${fmtDate(d)} ${todayMark}</div>`;
    byDate[d].forEach(g => { html += renderMatchCard(g); });
    html += `</div>`;
  });

  document.getElementById('schedule-body').innerHTML = html;
}

function renderMatchCard(g) {
  const isStatic = g._static;
  let home, away, homeFlag, awayFlag, scoreHTML, subHTML;

  if (isStatic) {
    home = g.team1; away = g.team2;
    homeFlag = staticFlag(home); awayFlag = staticFlag(away);
  } else {
    const ht = S.teamById[g.home_team_id]; const at = S.teamById[g.away_team_id];
    home = ht ? (ht.name_en || ht.name) : `#${g.home_team_id}`;
    away = at ? (at.name_en || at.name) : `#${g.away_team_id}`;
    homeFlag = teamFlag(ht); awayFlag = teamFlag(at);
  }

  const live = g.live === true || g.status === 'live' || g.status === 'in_progress';
  const finished = g.finished || g.status === 'finished' || (isStatic && g.score1 != null);
  const hs = isStatic ? g.score1 : g.home_score;
  const as_ = isStatic ? g.score2 : g.away_score;

  if (live) {
    scoreHTML = `<div class="score-display">${hs ?? 0} - ${as_ ?? 0}</div>`;
    subHTML = `<div class="match-sub"><span class="live-badge">LIVE</span></div>`;
  } else if (finished && hs != null) {
    scoreHTML = `<div class="score-display">${hs} - ${as_}</div>`;
    subHTML = `<div class="match-sub">終了</div>`;
  } else {
    const jst = toJST(g.time, g.date) || '--:--';
    scoreHTML = `<div class="match-time">${jst}</div>`;
    const rnd = g.round || '';
    const grp = g.group ? (g.group.startsWith('Group') ? g.group : `グループ${g.group}`) : '';
    subHTML = `<div class="match-sub">${grp || rnd}</div>`;
  }

  const today = isToday(g.date || g.local_date);
  const cls = `match-card${live ? ' is-live' : ''}${today ? ' is-today' : ''}`;
  const grpChip = g.group ? `<span class="group-chip">${g.group.startsWith('Group') ? g.group : 'グループ '+g.group}</span>` : (g.round ? `<span class="group-chip">${g.round}</span>` : '');

  return `
  <div class="${cls}">
    <div class="match-team">
      <span class="team-flag">${homeFlag}</span>
      <span class="team-name">${home}</span>
    </div>
    <div class="match-center">
      ${scoreHTML}${subHTML}
      ${grpChip}
    </div>
    <div class="match-team away">
      <span class="team-flag">${awayFlag}</span>
      <span class="team-name">${away}</span>
    </div>
  </div>`;
}

// RENDER: STANDINGS
// ======================================================
function renderStandings() {
  const table = computeStandings();
  const letters = 'ABCDEFGHIJKL'.split('');

  let html = '<div class="groups-grid">';
  letters.forEach(g => {
    const rows = table[g];
    if (!rows || !rows.length) return;
    html += `
    <div class="group-card">
      <div class="group-title">⚽ グループ ${g}</div>
      <table class="standings-table">
        <thead><tr>
          <th>#</th><th>チーム</th><th>試</th><th>勝</th><th>分</th><th>負</th>
          <th>得</th><th>失</th><th>差</th><th>勝点</th>
        </tr></thead>
        <tbody>`;
    rows.forEach((t, i) => {
      const qClass = i < 2 ? `q${i+1}` : i === 2 ? 'q3' : '';
      const f = staticFlag(t.name);
      const gd = t.gd >= 0 ? `+${t.gd}` : `${t.gd}`;
      html += `<tr class="${qClass}">
        <td class="rank-cell">${i+1}</td>
        <td>${f} ${t.name}</td>
        <td>${t.mp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
        <td>${t.gf}</td><td>${t.ga}</td><td>${gd}</td>
        <td class="pts-cell">${t.pts}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });
  html += '</div>';
  html += `<div class="standings-legend">
    <span class="legend-item"><span class="legend-dot" style="background:rgba(29,111,255,0.4)"></span>グループ通過（上位2チーム）</span>
    <span class="legend-item"><span class="legend-dot" style="background:rgba(240,165,0,0.4)"></span>3位通過の可能性</span>
  </div>`;

  document.getElementById('standings-body').innerHTML = html;
}

function computeStandings() {
  const tbl = {};  // letter → [{name,mp,w,d,l,gf,ga,gd,pts}]

  // Seed teams from API or static
  if (S.mode === 'live' && S.teams.length) {
    S.teams.forEach(t => {
      const g = t.groups || t.group;
      if (!g) return;
      if (!tbl[g]) tbl[g] = [];
      tbl[g].push({ id: String(t.id || t._id), name: t.name_en || t.name, mp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0 });
    });
    // Process live API games
    S.games.forEach(game => {
      if (!game.finished && game.status !== 'finished') return;
      const g = game.group;
      if (!g || !tbl[g]) return;
      const h = tbl[g].find(t => t.id === String(game.home_team_id));
      const a = tbl[g].find(t => t.id === String(game.away_team_id));
      if (!h || !a) return;
      const hs = parseInt(game.home_score)||0, as_ = parseInt(game.away_score)||0;
      h.mp++; a.mp++;
      h.gf += hs; h.ga += as_; a.gf += as_; a.ga += hs;
      h.gd = h.gf-h.ga; a.gd = a.gf-a.ga;
      if (hs > as_) { h.w++; h.pts+=3; a.l++; }
      else if (hs < as_) { a.w++; a.pts+=3; h.l++; }
      else { h.d++; h.pts++; a.d++; a.pts++; }
    });
    // Merge API group standing data (pts override)
    if (S.groups.length) {
      S.groups.forEach(grp => {
        const g = grp.group || grp.name;
        if (!g || !tbl[g] || !grp.teams) return;
        grp.teams.forEach(gt => {
          const entry = tbl[g].find(t => t.id === String(gt.team_id));
          if (!entry) return;
          // Update with server-provided pts/gf/ga (more authoritative)
          entry.pts = parseInt(gt.pts)||entry.pts;
          entry.gf  = parseInt(gt.gf)||entry.gf;
          entry.ga  = parseInt(gt.ga)||entry.ga;
          entry.gd  = entry.gf - entry.ga;
        });
      });
    }
  } else {
    // Fallback: build from static schedule (compute from scores if available)
    const teamGroups = {};
    STATIC_SCHEDULE.matches.forEach(m => {
      if (!m.group) return;
      const g = m.group.replace('Group ', '');
      if (!teamGroups[g]) teamGroups[g] = new Set();
      if (m.team1 && !m.team1.includes('winner') && !m.team1.includes('Path'))
        teamGroups[g].add(m.team1);
      if (m.team2 && !m.team2.includes('winner') && !m.team2.includes('Path'))
        teamGroups[g].add(m.team2);
    });
    Object.entries(teamGroups).forEach(([g, teams]) => {
      tbl[g] = [...teams].map(name => ({ name, mp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0 }));
    });
    // Apply scores from static data
    S.games.forEach(game => {
      if (!game.finished || game.score1 == null) return;
      const g = game.group;
      if (!g || !tbl[g]) return;
      const h = tbl[g].find(t => t.name === game.team1);
      const a = tbl[g].find(t => t.name === game.team2);
      if (!h || !a) return;
      const hs = parseInt(game.score1)||0, as_ = parseInt(game.score2)||0;
      h.mp++; a.mp++;
      h.gf+=hs; h.ga+=as_; a.gf+=as_; a.ga+=hs;
      h.gd=h.gf-h.ga; a.gd=a.gf-a.ga;
      if (hs>as_){h.w++;h.pts+=3;a.l++;}
      else if(hs<as_){a.w++;a.pts+=3;h.l++;}
      else{h.d++;h.pts++;a.d++;a.pts++;}
    });
  }

  // Sort
  Object.keys(tbl).forEach(g => {
    tbl[g].sort((a,b) => {
      if (b.pts!==a.pts) return b.pts-a.pts;
      if (b.gd!==a.gd)  return b.gd-a.gd;
      if (b.gf!==a.gf)  return b.gf-a.gf;
      return a.name.localeCompare(b.name);
    });
  });
  return tbl;
}

// RENDER: BRACKET
// ======================================================
function renderBracket() {
  const ROUNDS = [
    { key: 'Round of 32',      label: 'R32 ラウンド32',  short: 'R32' },
    { key: 'Round of 16',      label: 'R16 ラウンド16',  short: 'R16' },
    { key: 'Quarter-final',    label: 'QF 準々決勝',     short: 'QF' },
    { key: 'Semi-final',       label: 'SF 準決勝',       short: 'SF' },
    { key: 'Final',            label: '🏆 決勝',         short: 'F' },
  ];

  const byRound = {};
  ROUNDS.forEach(r => { byRound[r.key] = []; });
  let third = [];

  const src = S.mode === 'live' ? S.games : STATIC_SCHEDULE.matches;
  src.forEach(g => {
    const r = g.round || g.type || '';
    if (byRound[r]) byRound[r].push(g);
    if (r === 'Match for third place') third.push(g);
  });

  const hasKO = ROUNDS.some(r => byRound[r.key].length > 0);
  if (!hasKO) {
    document.getElementById('bracket-body').innerHTML =
      '<div class="loading-box">🏆 決勝トーナメントは 6月28日以降に開始予定です</div>';
    return;
  }

  let html = '<div class="bracket-scroll"><div class="bracket">';

  ROUNDS.forEach(rDef => {
    const games = byRound[rDef.key];
    if (!games.length) return;
    html += `<div class="b-round">
      <div class="b-round-title">${rDef.label}</div>
      <div class="b-round-matches">`;
    games.forEach(g => { html += renderBracketMatch(g); });
    html += `</div></div>`;
  });

  html += '</div></div>';

  // 3rd place
  if (third.length) {
    html += `<div class="bracket-3rd">
      <div class="bracket-3rd-title">🥉 3位決定戦</div>`;
    third.forEach(g => { html += renderBracketMatch(g); });
    html += `</div>`;
  }

  document.getElementById('bracket-body').innerHTML = html;
}

function renderBracketMatch(g) {
  let hName, aName, hFlag, aFlag, hScore, aScore, finished, hWin, aWin;

  if (g._static) {
    hName = g.team1; aName = g.team2;
    hFlag = staticFlag(hName); aFlag = staticFlag(aName);
    finished = g.score1 != null;
    hScore = g.score1; aScore = g.score2;
  } else {
    const ht = S.teamById[g.home_team_id]; const at = S.teamById[g.away_team_id];
    hName = ht ? (ht.name_en||ht.name) : (g.team1||`TBD`);
    aName = at ? (at.name_en||at.name) : (g.team2||`TBD`);
    hFlag = teamFlag(ht); aFlag = teamFlag(at);
    finished = g.finished || g.status === 'finished';
    hScore = g.home_score; aScore = g.away_score;
  }

  if (finished) { hWin = hScore > aScore; aWin = aScore > hScore; }

  const isTBDh = !hName || hName.match(/^[12W][A-L\d]/) || hName.includes('winner') || hName.includes('TBD');
  const isTBDa = !aName || aName.match(/^[12W][A-L\d]/) || aName.includes('winner') || aName.includes('TBD');

  const hClass = `b-team${hWin ? ' winner' : (finished && aWin ? ' loser' : '')}`;
  const aClass = `b-team${aWin ? ' winner' : (finished && hWin ? ' loser' : '')}`;

  return `
  <div class="b-match">
    <div class="${hClass}">
      ${isTBDh ? '' : `<span class="b-flag">${hFlag}</span>`}
      <span class="${isTBDh ? 'b-tbd' : ''}">${hName || 'TBD'}</span>
      ${finished ? `<span class="b-score">${hScore}</span>` : ''}
    </div>
    <div class="${aClass}">
      ${isTBDa ? '' : `<span class="b-flag">${aFlag}</span>`}
      <span class="${isTBDa ? 'b-tbd' : ''}">${aName || 'TBD'}</span>
      ${finished ? `<span class="b-score">${aScore}</span>` : ''}
    </div>
  </div>`;
}

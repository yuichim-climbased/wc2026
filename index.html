:root {

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system,'Segoe UI','Hiragino Sans',sans-serif; min-height: 100vh; }

.header {

.header h1 { font-size: clamp(1rem,3vw,1.5rem); font-weight: 900; }
.header-hosts { color: var(--gold); font-size: 0.78rem; margin-top: 3px; }
.header-meta { display: flex; align-items: center; justify-content: center; gap: 14px; font-size: 0.73rem; color: var(--muted); margin-top: 7px; }
.sdot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 4px; transition: background .3s; }
.sdot.loading { background: var(--gold); animation: blink 1s ease infinite; }
.sdot.error { background: var(--red); }
.sdot.fallback { background: var(--gold); }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

.tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 96px; z-index: 90; }
.tab { flex: 1; padding: 12px 6px; text-align: center; cursor: pointer; font-weight: 600; font-size: clamp(.7rem,2vw,.86rem); color: var(--muted); border-bottom: 3px solid transparent; transition: all .2s; user-select: none; }
.tab.active { color: var(--accent); border-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); background: var(--card2); }

.panel { display: none; padding: 14px 12px; max-width: 1280px; margin: 0 auto; }
.panel.active { display: block; }

.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.fbtn { padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; font-size: .77rem; font-weight: 600; transition: all .2s; white-space: nowrap; }
.fbtn.active, .fbtn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

.date-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; margin: 14px 0 7px; background: var(--card2); border-radius: 8px; font-weight: 700; font-size: .84rem; border-left: 3px solid var(--gold); color: var(--gold); }
.today-pill { background: var(--red); color: #fff; font-size: .63rem; padding: 2px 7px; border-radius: 9px; font-weight: 800; }

.mcard { background: var(--card); border-radius: 10px; padding: 11px 14px; margin-bottom: 7px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; border: 1px solid var(--border); transition: border-color .2s; }
.mcard:hover { border-color: var(--accent); }
.mcard.live { border-color: var(--red); animation: lpulse 2.5s ease infinite; }
.mcard.today { border-color: rgba(29,111,255,.4); }
@keyframes lpulse { 0%,100%{border-color:var(--red)}50%{border-color:#ff9090} }
.mteam { display: flex; align-items: center; gap: 7px; overflow: hidden; }
.mteam.away { flex-direction: row-reverse; text-align: right; }
.mflag { font-size: 1.35rem; flex-shrink: 0; }
.mname { font-weight: 600; font-size: clamp(.74rem,2vw,.9rem); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mcenter { text-align: center; min-width: 88px; }
.mscore { font-size: clamp(1.25rem,4vw,1.65rem); font-weight: 900; letter-spacing: 2px; }
.msub { font-size: .68rem; color: var(--muted); margin-top: 2px; display: flex; align-items: center; justify-content: center; gap: 4px; }
.live-badge { background: var(--red); color: #fff; font-size: .6rem; padding: 1px 6px; border-radius: 8px; font-weight: 800; letter-spacing: .5px; }
.mtime { font-size: .87rem; font-weight: 700; }
.mgroup { font-size: .62rem; color: var(--muted); background: var(--card2); padding: 2px 8px; border-radius: 8px; font-weight: 600; margin-top: 3px; display: inline-block; }

.ggrid { display: grid; grid-template-columns: repeat(auto-fill,minmax(310px,1fr)); gap: 14px; }
.gcard { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
.gtitle { background: linear-gradient(90deg,#0a1f5c,#1a3a8f); padding: 10px 14px; font-weight: 800; font-size: .93rem; color: var(--gold); }
.stbl { width: 100%; border-collapse: collapse; }
.stbl th { font-size: .63rem; color: var(--muted); padding: 6px 5px; text-align: center; background: var(--card2); font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
.stbl th:nth-child(2) { text-align: left; }
.stbl td { padding: 9px 5px; text-align: center; font-size: .81rem; border-top: 1px solid var(--border); }
.stbl td:nth-child(2) { text-align: left; font-weight: 600; }
.stbl tr:hover td { background: rgba(255,255,255,.03); }
.stbl tr.q td { background: rgba(29,111,255,.1); }
.stbl tr.q3 td { background: rgba(240,165,0,.09); }
.rnk { color: var(--muted); font-size: .79rem; font-weight: 700; }
.pts { font-weight: 900; }
.sleg { text-align: center; margin-top: 14px; font-size: .71rem; color: var(--muted); display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.ldot { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 4px; vertical-align: middle; }

.bscroll { overflow-x: auto; padding-bottom: 10px; }
.bracket { display: flex; min-width: 800px; }
.br { flex: 1; display: flex; flex-direction: column; }
.br-title { font-size: .67rem; font-weight: 800; color: var(--gold); text-align: center; padding: 9px 4px; text-transform: uppercase; letter-spacing: .8px; border-bottom: 1px solid var(--border); background: var(--card); white-space: nowrap; }
.br-matches { flex: 1; display: flex; flex-direction: column; justify-content: space-around; padding: 6px 3px; }
.bm { background: var(--card); border: 1px solid var(--border); border-radius: 7px; overflow: hidden; margin: 3px 0; transition: border-color .2s; }
.bm:hover { border-color: var(--accent); }
.bt { display: flex; align-items: center; gap: 5px; padding: 7px 8px; font-size: .75rem; font-weight: 600; }
.bt + .bt { border-top: 1px solid var(--border); }
.bt.win { background: rgba(34,197,94,.14); }
.bt.lose { color: var(--muted); }
.bsc { margin-left: auto; font-weight: 900; font-size: .85rem; }
.btbd { color: var(--muted); font-style: italic; font-weight: 400; font-size: .72rem; }
.bfl { font-size: 1.05rem; flex-shrink: 0; }

.loading-box { text-align: center; padding: 60px 20px; color: var(--muted); }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .9s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.err-box { text-align: center; padding: 40px 20px; }
.retry-btn { margin-top: 14px; padding: 8px 22px; background: var(--accent); border: none; color: #fff; border-radius: 8px; cursor: pointer; font-size: .85rem; font-weight: 600; }
.retry-btn:hover { background: #0a4fd8; }

@media(max-width:500px) {
  .tabs { top: 84px; }
  .mcard { gap: 5px; padding: 9px 9px; }
  .ggrid { grid-template-columns: 1fr; }
}

    S.matches = events.map(parseESPN);
    S.mode = 'live';
    setDot('ok', `最終更新: ${new Date().toLocaleTimeString('ja-JP')}`);
  } catch(e) {
    console.warn('ESPN failed:', e.message, '— using static fallback');
    // Try today's ESPN endpoint as secondary attempt
    try {
      const r2 = await fetch(`${ESPN}/scoreboard`);
      if (r2.ok) {
        const d2 = await r2.json();
        const ev2 = d2.events || [];
        if (ev2.length) {
          // Merge today's live data with static schedule
          const liveToday = ev2.map(parseESPN);
          const todayStr = new Date().toISOString().slice(0,10);
          // Replace static entries for today with live data
          const staticOther = STATIC.filter(m => m.d !== todayStr);
          S.matches = [...liveToday, ...staticOther.map(staticToMatch)].sort((a,b)=>a.date<b.date?-1:1);
          S.mode = 'partial';
          setDot('fallback', `本日のみ Live · 他は静的データ`);
          render(); scheduleRefresh(); return;
        }
      }
    } catch(_) {}
    // Full fallback
    S.matches = STATIC.map(staticToMatch);
    S.mode = 'fallback';
    setDot('fallback', `静的スケジュール表示中`);
  }
  render();
  scheduleRefresh();
}

function parseESPN(ev) {
  const comp = (ev.competitions || [])[0] || {};
  const comps = comp.competitors || [];
  const home = comps.find(c => c.homeAway === 'home') || comps[0] || {};
  const away = comps.find(c => c.homeAway === 'away') || comps[1] || {};
  const status = comp.status || {};
  const stype = status.type || {};

  // Group from notes
  let group = '';
  const notes = comp.notes || [];
  for (const n of notes) {
    const m = (n.headline || '').match(/Group\s+([A-L])/i);
    if (m) { group = m[1]; break; }
  }
  // Also check groups field
  if (!group && comp.groups) {
    const gm = (comp.groups.name || comp.groups.shortName || '').match(/([A-L])$/i);
    if (gm) group = gm[1];
  }

  // Round detection
  let round = '';
  const seasonType = (ev.season || {}).type;
  if (seasonType === 2) round = 'group';
  else if (seasonType === 3 || !group) {
    const n = ev.name || '';
    if (n.includes('Round of 32') || n.includes('ラウンド32')) round = 'Round of 32';
    else if (n.includes('Round of 16') || n.includes('ラウンド16')) round = 'Round of 16';
    else if (n.includes('Quarterfinal') || n.includes('Quarter')) round = 'Quarter-final';
    else if (n.includes('Semifinal') || n.includes('Semi')) round = 'Semi-final';
    else if (n.includes('Third') || n.includes('3rd')) round = '3rd Place';
    else if (n.includes('Final')) round = 'Final';
  }

  const state = stype.state || ''; // 'pre'|'in'|'post'
  const completed = stype.completed || false;
  const hs = parseInt(home.score) || 0;
  const as_ = parseInt(away.score) || 0;

  return {
    id: ev.id,
    date: (ev.date || '').slice(0,10),
    dateObj: new Date(ev.date || ''),
    homeName: (home.team || {}).displayName || '?',
    awayName: (away.team || {}).displayName || '?',
    homeScore: hs, awayScore: as_,
    group, round,
    venue: ((comp.venue || {}).fullName) || '',
    state,     // 'pre'|'in'|'post'
    completed,
    detail: stype.detail || '',        // "1:00 PM JST" or "Final"
    shortDetail: stype.shortDetail || '',
    live: state === 'in',
  };
}

function staticToMatch(m) {
  return {
    id: null, date: m.d, dateObj: new Date(m.d),
    homeName: m.t, awayName: m.a,
    homeScore: null, awayScore: null,
    group: m.g || '', round: m.round || '',
    venue: '', state: 'pre', completed: false,
    detail: toJST(m.time), shortDetail: '',
    live: false, _static: true,
  };
}

// ── HELPERS ───────────────────────────────────────────────────────────────
const f = n => FLAG[n] || '🏳️';

function toJST(time) {
  if (!time) return '';
  const m = time.match(/(\d{1,2}):(\d{2})\s*UTC([+-]\d+)/);
  if (!m) return time;
  const jh = (((parseInt(m[1]) - parseInt(m[3]) + 9) % 24) + 24) % 24;
  return `${String(jh).padStart(2,'0')}:${m[2]} JST`;
}

const TODAY = new Date().toISOString().slice(0,10);
const isToday = d => d === TODAY;

function fmtDate(d) {
  const p = new Date(d + 'T12:00:00');
  if (isNaN(p)) return d;
  return p.toLocaleDateString('ja-JP', { month:'long', day:'numeric', weekday:'short' });
}

function setDot(cls, msg) {
  document.getElementById('sdot').className = 'sdot ' + cls;
  document.getElementById('last-upd').textContent = msg;
}

function scheduleRefresh() {
  clearTimeout(rTimer); clearInterval(cTimer);
  nextAt = Date.now() + REFRESH;
  rTimer = setTimeout(loadData, REFRESH);
  cTimer = setInterval(() => {
    const rem = Math.max(0, nextAt - Date.now());
    const m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
    document.getElementById('next-ref').textContent = `${m}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() { buildFilter(); renderSchedule(); renderStandings(); renderBracket(); }

function buildFilter() {
  const bar = document.getElementById('fbar');
  const letters = 'ABCDEFGHIJKL'.split('');
  const g = S.activeGroup;
  bar.innerHTML = `
    <button class="fbtn ${g==='all'?'active':''}" data-g="all">すべて</button>
    <button class="fbtn ${g==='today'?'active':''}" data-g="today">本日</button>
    <button class="fbtn ${g==='ko'?'active':''}" data-g="ko">決勝T</button>
    ${letters.map(l=>`<button class="fbtn ${g===l?'active':''}" data-g="${l}">G.${l}</button>`).join('')}`;
}

// ── SCHEDULE ─────────────────────────────────────────────────────────────
function renderSchedule() {
  let ms = [...S.matches];
  const g = S.activeGroup;

  if (g === 'today') {
    ms = ms.filter(m => isToday(m.date));
  } else if (g === 'ko') {
    ms = ms.filter(m => !m.group || m.round);
  } else if (g !== 'all') {
    ms = ms.filter(m => m.group === g);
  }

  if (!ms.length) {
    document.getElementById('sch-body').innerHTML = '<div class="loading-box">📭 該当する試合がありません</div>';
    return;
  }

  // Sort by date then time
  ms.sort((a,b) => a.dateObj-b.dateObj);

  // Group by date
  const byDate = {};
  ms.forEach(m => { (byDate[m.date]||(byDate[m.date]=[])).push(m); });

  let html = '';
  Object.keys(byDate).sort().forEach(d => {
    const today = isToday(d);
    html += `<div class="date-header">📅 ${fmtDate(d)} ${today?'<span class="today-pill">TODAY</span>':''}</div>`;
    byDate[d].forEach(m => { html += matchCard(m); });
  });

  document.getElementById('sch-body').innerHTML = html;
}

function matchCard(m) {
  const hf = f(m.homeName), af = f(m.awayName);
  let center;

  if (m.live) {
    center = `<div class="mscore">${m.homeScore} - ${m.awayScore}</div>
      <div class="msub"><span class="live-badge">LIVE</span>${m.detail||''}</div>`;
  } else if (m.completed) {
    const hw = m.homeScore > m.awayScore, aw = m.awayScore > m.homeScore;
    center = `<div class="mscore" style="${hw?'color:var(--green)':aw?'color:var(--red)':''}">${m.homeScore} - ${m.awayScore}</div>
      <div class="msub">終了</div>`;
  } else {
    const time = m.detail || toJST(m.detail) || '--:-- JST';
    const label = m.group ? `グループ ${m.group}` : (m.round || '');
    center = `<div class="mtime">${time}</div><div class="msub">${label}</div>`;
  }

  const chip = m.group ? `グループ ${m.group}` : (m.round || '');
  const cls = `mcard${m.live?' live':''}${isToday(m.date)?' today':''}`;

  return `<div class="${cls}">
    <div class="mteam"><span class="mflag">${hf}</span><span class="mname">${m.homeName}</span></div>
    <div class="mcenter">${center}${chip?`<span class="mgroup">${chip}</span>`:''}</div>
    <div class="mteam away"><span class="mflag">${af}</span><span class="mname">${m.awayName}</span></div>
  </div>`;
}

// ── STANDINGS ─────────────────────────────────────────────────────────────
function renderStandings() {
  const tbl = computeStandings();
  const letters = 'ABCDEFGHIJKL'.split('');
  let html = '<div class="ggrid">';

  letters.forEach(g => {
    const rows = tbl[g];
    if (!rows || !rows.length) return;
    html += `<div class="gcard"><div class="gtitle">⚽ グループ ${g}</div>
    <table class="stbl">
      <thead><tr><th>#</th><th>チーム</th><th>試</th><th>勝</th><th>分</th><th>負</th><th>得</th><th>失</th><th>差</th><th>勝点</th></tr></thead>
      <tbody>`;
    rows.forEach((r,i) => {
      const cls = i<2?'q':i===2?'q3':'';
      const gd = r.gd>=0?'+'+r.gd:r.gd;
      html += `<tr class="${cls}"><td class="rnk">${i+1}</td><td>${f(r.name)} ${r.name}</td>
        <td>${r.mp}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
        <td>${r.gf}</td><td>${r.ga}</td><td>${gd}</td><td class="pts">${r.pts}</td></tr>`;
    });
    html += `</tbody></table></div>`;
  });

  html += `</div><div class="sleg">
    <span><span class="ldot" style="background:rgba(29,111,255,.5)"></span>グループ通過（上位2チーム）</span>
    <span><span class="ldot" style="background:rgba(240,165,0,.5)"></span>3位通過の可能性</span>
  </div>`;

  document.getElementById('std-body').innerHTML = html;
}

function computeStandings() {
  const tbl = {};

  // Seed teams for each group from matches
  S.matches.filter(m => m.group).forEach(m => {
    const g = m.group;
    if (!tbl[g]) tbl[g] = {};
    [m.homeName, m.awayName].forEach(nm => {
      if (nm && nm !== 'TBD' && !nm.match(/^[12W][A-L\d]/) && !nm.includes('3rd') && !nm.includes('Path') && !nm.includes('winner')) {
        if (!tbl[g][nm]) tbl[g][nm] = {name:nm,mp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0};
      }
    });
  });

  // Process completed group matches
  S.matches.filter(m => m.group && m.completed && m.homeScore != null).forEach(m => {
    const g = m.group;
    if (!tbl[g]) return;
    const h = tbl[g][m.homeName], a = tbl[g][m.awayName];
    if (!h || !a) return;
    const hs = m.homeScore, as_ = m.awayScore;
    h.mp++; a.mp++;
    h.gf+=hs; h.ga+=as_; a.gf+=as_; a.ga+=hs;
    h.gd=h.gf-h.ga; a.gd=a.gf-a.ga;
    if (hs>as_){h.w++;h.pts+=3;a.l++;}
    else if(hs<as_){a.w++;a.pts+=3;h.l++;}
    else{h.d++;h.pts++;a.d++;a.pts++;}
  });

  // Convert to sorted arrays
  const out = {};
  Object.entries(tbl).forEach(([g,teams]) => {
    out[g] = Object.values(teams).sort((a,b)=>{
      if(b.pts!==a.pts)return b.pts-a.pts;
      if(b.gd!==a.gd)return b.gd-a.gd;
      if(b.gf!==a.gf)return b.gf-a.gf;
      return a.name.localeCompare(b.name);
    });
  });
  return out;
}

// ── BRACKET ───────────────────────────────────────────────────────────────
function renderBracket() {
  const ROUNDS = [
    {key:'Round of 32', label:'ラウンド32'},
    {key:'Round of 16', label:'ラウンド16'},
    {key:'Quarter-final', label:'準々決勝'},
    {key:'Semi-final', label:'準決勝'},
    {key:'Final', label:'🏆 決勝'},
  ];

  const byRound = {};
  ROUNDS.forEach(r => { byRound[r.key] = []; });
  let third = [];

  // Use live data if available, else static
  const src = S.matches.filter(m => !m.group || m.round);
  src.forEach(m => {
    const r = m.round;
    if (byRound[r]) byRound[r].push(m);
    if (r === '3rd Place') third.push(m);
  });

  const hasKO = ROUNDS.some(r => byRound[r.key].length > 0);
  if (!hasKO) {
    document.getElementById('brk-body').innerHTML =
      '<div class="loading-box">🏆 決勝トーナメントは 6月28日以降に開始予定です</div>';
    return;
  }

  let html = '<div class="bscroll"><div class="bracket">';
  ROUNDS.forEach(rd => {
    const ms = byRound[rd.key];
    if (!ms.length) return;
    html += `<div class="br"><div class="br-title">${rd.label}</div><div class="br-matches">`;
    ms.forEach(m => { html += bracketMatch(m); });
    html += `</div></div>`;
  });
  html += '</div></div>';

  if (third.length) {
    html += `<div style="margin-top:20px;font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:8px;padding-left:4px">🥉 3位決定戦</div>`;
    third.forEach(m => { html += bracketMatch(m); });
  }

  document.getElementById('brk-body').innerHTML = html;
}

function bracketMatch(m) {
  const tbd_h = !m.homeName || m.homeName==='TBD'||m.homeName.match(/^[12W3]/);
  const tbd_a = !m.awayName || m.awayName==='TBD'||m.awayName.match(/^[12W3]/);
  const hw = m.completed && m.homeScore > m.awayScore;
  const aw = m.completed && m.awayScore > m.homeScore;
  const hcls = `bt${hw?' win':m.completed&&aw?' lose':''}`;
  const acls = `bt${aw?' win':m.completed&&hw?' lose':''}`;
  return `<div class="bm">
    <div class="${hcls}">
      ${!tbd_h?`<span class="bfl">${f(m.homeName)}</span>`:''}
      <span class="${tbd_h?'btbd':''}">${m.homeName||'TBD'}</span>
      ${m.completed?`<span class="bsc">${m.homeScore}</span>`:''}
    </div>
    <div class="${acls}">
      ${!tbd_a?`<span class="bfl">${f(m.awayName)}</span>`:''}
      <span class="${tbd_a?'btbd':''}">${m.awayName||'TBD'}</span>
      ${m.completed?`<span class="bsc">${m.awayScore}</span>`:''}
    </div>
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  S.activeTab = t.dataset.tab;
  document.getElementById('panel-'+S.activeTab).classList.add('active');
}));

document.getElementById('fbar').addEventListener('click', e => {
  const b = e.target.closest('[data-g]');
  if (!b) return;
  S.activeGroup = b.dataset.g;
  buildFilter();
  renderSchedule();
});

// ── START ─────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
